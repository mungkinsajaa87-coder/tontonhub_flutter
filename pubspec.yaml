name: tontonhub
version: 1.0.0+1
publish_to: 'none'
description: Aplikasi Video Streaming Platform berbasis Flutter dan Firebase untuk tugas proyek lintas platform.

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.4.1
  image_picker: ^1.2.2
  provider: ^6.1.5
  intl: ^0.20.2
  video_player: ^2.10.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
